- type: entity
  id: RenegateTechFab
  parent: FactionLathe
  name: renegate techfab
  description: Military-grade fabricator used by Renegate crews.
  suffix: Ренегаты
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/ren_techfab.rsi
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: renegate
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - StaticAmmoRecipePack
    dynamicPacks:
    - RenegateWeaponsDynamic
    - RenegateEquipmentDynamic
    - RenegateAmmoDynamic
    - RenegateVoucherDynamic

- type: entity
  id: ProtolatheRenegate
  parent: Protolathe
  name: renegate protolathe
  suffix: Ренегаты

- type: entity
  id: AutolatheRenegate
  parent: Autolathe
  name: renegate autolathe
  suffix: Ренегаты

- type: entity
  id: TraumaTechFab
  parent: [BlueprintReceiverBase, BaseLatheLube]
  name: trauma techfab
  description: Prints equipment for use by the medbay.
  components:
  - type: Sprite
    sprite: Forge/Structures/Machines/techfab.rsi
    layers:
    - state: icon
      map: [ "enum.LatheVisualLayers.IsRunning" ]
    - state: tti
    - state: unlit
      shader: unshaded
      map: [ "enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - TopicalsStatic
    - ChemistryStatic
    - MedicalStatic
    - RollerBedsStatic
    - MedicalClothingStatic
    - EmptyMedkitsStatic
    - SurgeryStatic
    - NFMedicalStatic # Frontier
    dynamicPacks:
    - TTISuplplies # Forge-change
    - TTIEquipment # Forge-change
    - Chemistry
    - SyringeGuns # DeltaV
    - NFMedical # Frontier
    # Shitmed Change
    - SMSurgery
    - SMCybernetics
    # Einstein Engines Packs
    - Translators # Language
    - TranslatorImplanters # Language
  - type: Machine
    board: TraumaTechFabCircuitboard