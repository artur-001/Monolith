- type: entity
  id: ActionReturnChainsawShield
  name: Return chainsaw shield
  description: Return the thrown chainsaw shield to a free hand.
  components:
  - type: InstantAction
    useDelay: 1
    itemIconStyle: BigAction
    icon:
      sprite: Forge/Objects/Weapons/Melee/chainsaw-shield.rsi
      state: shield-icon
    event: !type:ReturnOnThrowActionEvent

